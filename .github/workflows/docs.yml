name: Build PDF Documentation

on:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: docs
          texlive_version: latest

      - name: Get date
        id: date
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Rename PDF
        run: mv docs/main.pdf docs/cdboost-experiments-${{ steps.date.outputs.DATE }}.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: cdboost-experiments-docs
          path: docs/cdboost-experiments-${{ steps.date.outputs.DATE }}.pdf
          retention-days: 14
