name: Build PDF Documentation

on:
  push:
    branches: [main]

permissions: {}

jobs:
  docs:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          root_file: main.tex
          working_directory: docs
          texlive_version: latest

      - name: Get date
        id: date
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Rename PDF
        run: mv docs/main.pdf docs/cdboost-experiments-${{ steps.date.outputs.DATE }}.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdboost-experiments-docs
          path: docs/cdboost-experiments-${{ steps.date.outputs.DATE }}.pdf
          retention-days: 14
