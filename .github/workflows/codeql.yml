name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '13 7 * * 3'

permissions: {}

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_COMMIT: 67b207f199b5d2ee09f206d2e9e9171e7c7a3274

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@051e2f90686233507fe9283ff167d2e709304b30 # v3.36.0
        with:
          languages: c-cpp

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          git -C $VCPKG_ROOT checkout ${{ env.VCPKG_COMMIT }}
          $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@051e2f90686233507fe9283ff167d2e709304b30 # v3.36.0
        with:
          category: "/language:c-cpp"
